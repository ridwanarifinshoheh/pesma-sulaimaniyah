{% extends "base.html" %}
{% block title %}Login Admin{% endblock %}

{% block content %}
<section class="page-header">
  <div class="container">
    <h1>Login Admin</h1>
    <p>Masuk untuk mengakses dashboard dan data pendaftar secara aman.</p>
  </div>
</section>

<section class="section-panel login-section">
  <div class="container">
    <div class="form-panel form-panel-sm">
      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <input name="username" placeholder="Username" required>
        </div>

        <div class="form-group">
          <input name="password" type="password" placeholder="Password" required>
        </div>

        <button type="submit" class="btn-submit">Login</button>
      </form>

      <div style="margin-top: 18px; text-align: center;">
        <a href="/" class="btn" style="background: transparent; color: var(--text); border: 1px solid var(--border);">← Kembali ke Home</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
