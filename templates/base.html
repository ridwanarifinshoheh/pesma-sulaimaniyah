<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Pesantren Modern{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header class="navbar">
    <div class="nav-brand">
      <a href="/">Pesantren Sulaimaniyah</a>
    </div>

    <nav id="navMenu" class="nav-links">
      <a href="/">Home</a>
      <a href="/program">Program</a>
      <a href="/contact">Kontak</a>
      <a href="/daftar">Daftar</a>
    </nav>

    <div class="nav-actions">
      <button id="themeToggle" class="icon-btn" type="button">🌙</button>
      <button id="menuToggle" class="icon-btn nav-toggle" type="button">☰</button>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <p>© 2026 Pesantren Sulaimaniyah. All Rights Reserved.</p>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
  <script src="{{ url_for('static', filename='js/extra.js') }}"></script>
</body>
</html>
