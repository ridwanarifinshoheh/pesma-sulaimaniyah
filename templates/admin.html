{% extends "base.html" %}
{% block title %}Admin{% endblock %}

{% block content %}

<div class="container admin-box">

  <h1>Dashboard</h1>

  <table class="data-table">
    <tr>
      <th>Nama</th>
      <th>Email</th>
    </tr>

    {% for s in data %}
    <tr>
      <td>{{ s.nama }}</td>
      <td>{{ s.email }}</td>
    </tr>
    {% endfor %}
  </table>

</div>

{% endblock %}
