{% extends "base.html" %}
{% block title %}Daftar Santri{% endblock %}

{% block content %}
<section class="page-header">
  <div class="container">
    <h1>Daftar Santri Baru</h1>
    <p>Lengkapi formulir pendaftaran untuk bergabung dalam program pendidikan kami.</p>
  </div>
</section>

<section class="section-panel register-section">
  <div class="container">
    <div class="form-panel">
      <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
          <input name="nama" placeholder="Nama Lengkap" required>
        </div>

        <div class="form-group">
          <input name="email" type="email" placeholder="Email" required>
        </div>

        <div class="form-group">
          <input name="no_hp" placeholder="Nomor HP" required>
        </div>

        <div class="form-group">
          <input type="file" name="dokumen" accept=".png,.jpg,.jpeg,.pdf" required>
        </div>

        <button type="submit" class="btn-submit">Daftar Sekarang</button>
      </form>
      <div style="margin-top: 18px; text-align: center;">
        <a href="/" class="btn" style="background: transparent; color: var(--text); border: 1px solid var(--border);">← Kembali ke Home</a>
      </div>
    </div>
  </div>
</section>
{% endblock %}
